<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="1200" height="400" fill="#0d1117"/>
  <!-- Gradients -->
  <defs>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b72" />
      <stop offset="50%" stop-color="#a5d6ff" />
      <stop offset="100%" stop-color="#7ee787" />
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7b72" />
      <stop offset="100%" stop-color="#f25900" />
    </linearGradient>
  </defs>
  
  <!-- Graphic: Grid representation of Underfitting -->
  <g opacity="0.15">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#8b949e" stroke-width="1"/>
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#8b949e" stroke-width="1"/>
  </g>

  <!-- Curve data points -->
  <g fill="#58a6ff" opacity="0.6">
    <circle cx="800" cy="320" r="8" />
    <circle cx="850" cy="270" r="8" />
    <circle cx="900" cy="180" r="8" />
    <circle cx="950" cy="120" r="8" />
    <circle cx="1000" cy="110" r="8" />
    <circle cx="1050" cy="160" r="8" />
    <circle cx="1100" cy="260" r="8" />
  </g>

  <!-- Rigid underfitting line -->
  <line x1="750" y1="200" x2="1150" y2="200" stroke="url(#line-grad)" stroke-width="6" stroke-dasharray="2" />
  <text x="950" y="230" fill="#ff7b72" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Rigid Underfit Line (High Bias)</text>

  <!-- Main Title -->
  <text x="80" y="180" fill="url(#title-grad)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="900">AWESOME</text>
  <text x="80" y="250" fill="url(#title-grad)" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="900">UNDERFITTING</text>
  
  <!-- Subtitle -->
  <text x="80" y="300" fill="#8b949e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="500">Understanding bias, capacity constraints, and optimization bottlenecks in AI</text>
</svg>
